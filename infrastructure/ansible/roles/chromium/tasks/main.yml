- name: Install Chromium and headless dependencies
  ansible.builtin.apt:
    name:
      - chromium
      - libnss3
      - libatk1.0-0
      - libatk-bridge2.0-0
      - libcups2
      - libdrm2
      - libxkbcommon0
      - libxcomposite1
      - libxdamage1
      - libxrandr2
      - libgbm1
      - libpango-1.0-0
      - libcairo2
      - libasound2
      - libxshmfence1
      - fonts-liberation
      - dbus
    state: present
  become: true
